<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img">
  <rect width="1200" height="800" fill="#f5f3ef"/>

  <!-- theme panel: the brand identity, defined once -->
  <g>
    <rect x="110" y="170" width="330" height="460" rx="20" fill="#ffffff" stroke="#e2ddd3" stroke-width="2"/>
    <!-- colors -->
    <rect x="152" y="214" width="76" height="12" rx="6" fill="#c9c2b6"/>
    <circle cx="176" cy="278" r="24" fill="#254d38"/>
    <circle cx="240" cy="278" r="24" fill="#dba323"/>
    <circle cx="304" cy="278" r="24" fill="#dfe8e0" stroke="#e2ddd3" stroke-width="2"/>
    <!-- type scale -->
    <rect x="152" y="344" width="76" height="12" rx="6" fill="#c9c2b6"/>
    <rect x="152" y="380" width="200" height="26" rx="8" fill="#1c1917"/>
    <rect x="152" y="418" width="150" height="16" rx="8" fill="#1c1917" opacity="0.55"/>
    <rect x="152" y="446" width="170" height="10" rx="5" fill="#1c1917" opacity="0.3"/>
    <!-- logo -->
    <rect x="152" y="500" width="76" height="12" rx="6" fill="#c9c2b6"/>
    <rect x="152" y="532" width="58" height="58" rx="14" fill="#254d38"/>
    <circle cx="196" cy="576" r="16" fill="#f0c84d"/>
  </g>

  <!-- the thread: theme drives the deck -->
  <path d="M 460 400 C 510 400, 520 330, 575 330" fill="none" stroke="#dba323" stroke-width="7" stroke-linecap="round" stroke-dasharray="1 22"/>
  <path d="M 460 430 C 520 438, 540 444, 596 445" fill="none" stroke="#dba323" stroke-width="7" stroke-linecap="round" stroke-dasharray="1 22"/>

  <!-- deck of slides, all carrying the theme -->
  <g>
    <rect x="656" y="216" width="480" height="300" rx="20" fill="#e8e3d6"/>
    <rect x="628" y="188" width="480" height="300" rx="20" fill="#dfe8e0"/>
    <rect x="600" y="160" width="480" height="300" rx="20" fill="#254d38"/>
    <rect x="644" y="206" width="96" height="13" rx="6.5" fill="#f0c84d"/>
    <rect x="644" y="244" width="300" height="24" rx="12" fill="#f5f3ef"/>
    <rect x="644" y="280" width="210" height="24" rx="12" fill="#f5f3ef" opacity="0.65"/>
    <g fill="#f0c84d">
      <rect x="644" y="352" width="40" height="62" rx="5" opacity="0.45"/>
      <rect x="696" y="330" width="40" height="84" rx="5" opacity="0.6"/>
      <rect x="748" y="362" width="40" height="52" rx="5" opacity="0.8"/>
      <rect x="800" y="312" width="40" height="102" rx="5"/>
    </g>
    <rect x="988" y="200" width="52" height="52" rx="12" fill="#f5f3ef"/>
    <circle cx="1028" cy="240" r="14" fill="#f0c84d"/>
  </g>

</svg>
