<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img">
  <rect width="1200" height="675" fill="#f5f3ef"/>
  <!-- three copies of the same slide, three brand identities -->
  <g transform="translate(90 200)">
    <rect width="300" height="200" rx="16" fill="#191735"/>
    <rect x="28" y="30" width="80" height="12" rx="6" fill="#e4572e"/>
    <rect x="28" y="62" width="180" height="18" rx="9" fill="#f4f1ea"/>
    <rect x="28" y="88" width="130" height="18" rx="9" fill="#f4f1ea" opacity="0.6"/>
    <g fill="#e4572e">
      <rect x="28" y="130" width="26" height="46" rx="4" opacity="0.5"/>
      <rect x="62" y="118" width="26" height="58" rx="4" opacity="0.75"/>
      <rect x="96" y="140" width="26" height="36" rx="4"/>
    </g>
  </g>
  <g transform="translate(450 160)">
    <rect width="300" height="200" rx="16" fill="#f4f6f8" stroke="#10304c" stroke-width="2"/>
    <rect x="28" y="30" width="80" height="12" rx="6" fill="#1a6fb5"/>
    <rect x="28" y="62" width="180" height="18" rx="9" fill="#10304c"/>
    <rect x="28" y="88" width="130" height="18" rx="9" fill="#10304c" opacity="0.55"/>
    <g fill="#1a6fb5">
      <rect x="28" y="130" width="26" height="46" rx="4" opacity="0.5"/>
      <rect x="62" y="118" width="26" height="58" rx="4" opacity="0.75"/>
      <rect x="96" y="140" width="26" height="36" rx="4"/>
    </g>
  </g>
  <g transform="translate(810 240)">
    <rect width="300" height="200" rx="16" fill="#fdf8ec" stroke="#2c3b23" stroke-width="2"/>
    <rect x="28" y="30" width="80" height="12" rx="6" fill="#6a9a3d"/>
    <rect x="28" y="62" width="180" height="18" rx="9" fill="#2c3b23"/>
    <rect x="28" y="88" width="130" height="18" rx="9" fill="#2c3b23" opacity="0.55"/>
    <g fill="#6a9a3d">
      <rect x="28" y="130" width="26" height="46" rx="4" opacity="0.5"/>
      <rect x="62" y="118" width="26" height="58" rx="4" opacity="0.75"/>
      <rect x="96" y="140" width="26" height="36" rx="4"/>
    </g>
  </g>
  <!-- brass thread connecting them -->
  <path d="M 240 470 C 350 540, 500 420, 600 430 C 720 442, 800 520, 960 510" fill="none" stroke="#dba323" stroke-width="8" stroke-linecap="round" stroke-dasharray="1 26"/>
</svg>
