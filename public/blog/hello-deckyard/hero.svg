<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img">
  <rect width="1200" height="675" fill="#f5f3ef"/>
  <!-- fanned deck of slides -->
  <g transform="translate(600 360)">
    <rect x="-330" y="-200" width="660" height="400" rx="24" fill="#dfe8e0" transform="rotate(-9)"/>
    <rect x="-330" y="-200" width="660" height="400" rx="24" fill="#dba323" transform="rotate(-4)" opacity="0.9"/>
    <rect x="-330" y="-200" width="660" height="400" rx="24" fill="#254d38" transform="rotate(2)"/>
  </g>
  <!-- slide face content -->
  <g transform="translate(600 360) rotate(2)">
    <rect x="-282" y="-152" width="120" height="16" rx="8" fill="#f0c84d"/>
    <rect x="-282" y="-104" width="420" height="34" rx="10" fill="#f5f3ef"/>
    <rect x="-282" y="-56" width="300" height="34" rx="10" fill="#f5f3ef" opacity="0.7"/>
    <g fill="#f0c84d">
      <rect x="-282" y="60" width="52" height="90" rx="6" opacity="0.45"/>
      <rect x="-214" y="30" width="52" height="120" rx="6" opacity="0.6"/>
      <rect x="-146" y="72" width="52" height="78" rx="6" opacity="0.8"/>
      <rect x="-78" y="10" width="52" height="140" rx="6"/>
    </g>
  </g>
</svg>
