<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img">
  <rect width="1200" height="675" fill="#f3ecd9"/>
  <!-- Dreamkit side: riso blue/orange -->
  <g>
    <rect x="120" y="140" width="400" height="400" rx="8" fill="#1c2d6e"/>
    <rect x="160" y="180" width="400" height="400" rx="8" fill="#ff7c1f" opacity="0.9"/>
    <circle cx="360" cy="380" r="90" fill="#f3ecd9"/>
  </g>
  <!-- Deckyard side: green/brass, soft radius -->
  <g>
    <rect x="680" y="180" width="400" height="320" rx="28" fill="#254d38"/>
    <rect x="720" y="220" width="180" height="20" rx="10" fill="#f0c84d"/>
    <rect x="720" y="264" width="280" height="20" rx="10" fill="#f5f3ef" opacity="0.8"/>
    <g fill="#f0c84d">
      <rect x="720" y="340" width="40" height="110" rx="5" opacity="0.5"/>
      <rect x="774" y="310" width="40" height="140" rx="5" opacity="0.7"/>
      <rect x="828" y="360" width="40" height="90" rx="5" opacity="0.85"/>
      <rect x="882" y="290" width="40" height="160" rx="5"/>
    </g>
  </g>
  <!-- connection -->
  <g stroke="#0a0e1a" stroke-width="10" stroke-linecap="round" stroke-dasharray="2 32">
    <line x1="560" y1="360" x2="680" y2="360"/>
  </g>
  <circle cx="620" cy="360" r="26" fill="#dba323"/>
</svg>
