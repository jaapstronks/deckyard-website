name: Deploy Website

# Builds the static Astro site and deploys it to the Hetzner box (Bolster)
# that serves deckyard.eu via Caddy (automatic Let's Encrypt TLS). The one-time
# infra bootstrap (server, DNS) is handled by bolster-admin.
#
# Required GitHub secrets (Settings -> Secrets and variables -> Actions):
#   DEPLOY_SSH_KEY      Private SSH key for the `deploy` user on the box
#   DEPLOY_HOST         Public IP / hostname of the box
#   DEPLOY_KNOWN_HOSTS  ssh-keyscan output for the box (host-key pinning)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: true

env:
  DEPLOY_USER: deploy
  DEPLOY_PATH: /var/www/deckyard

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -rltvz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            ./dist/ \
            "${DEPLOY_USER}@${{ secrets.DEPLOY_HOST }}:${DEPLOY_PATH}/"
